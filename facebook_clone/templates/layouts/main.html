{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="{% static 'base/img/favicon.ico' %}">
    <title>{% block title %}Facebook Clone{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'base/css/global.css' %}">
    <link rel="stylesheet" href="{% static 'base/css/navbar.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    {% block extra_head %}{% endblock %}
</head>
<body>

    {% include 'includes/navbar.html' %}

    {% if messages %}
    <div style="max-width:590px;margin:8px auto 0;padding:0 8px;">
      {% for msg in messages %}
      <div style="background:#e7f3ff;border:1px solid #b3d4fc;border-radius:8px;padding:10px 16px;font-size:14px;color:#050505;display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
        <span><i class="fa-solid fa-circle-check" style="color:#1877f2;margin-right:8px;"></i>{{ msg }}</span>
        <button onclick="this.parentElement.remove()" style="background:none;border:none;font-size:18px;cursor:pointer;color:#65676b;padding:0 4px;">&times;</button>
      </div>
      {% endfor %}
    </div>
    {% endif %}

    <div class="layout">
        <main class="layout-main">
            {% block content %}{% endblock %}
        </main>
    </div>

<script src="{% static 'base/js/main.js' %}"></script>
</body>
</html>
