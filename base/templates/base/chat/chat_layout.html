{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Chat{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'base/css/global.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        .chat-page {
            display: flex;
            height: calc(100vh - 60px);
            max-width: 1200px;
            margin: 0 auto;
        }
        .chat-sidebar {
            width: 340px;
            border-right: 1px solid #e4e6eb;
            background: #fff;
            overflow-y: auto;
        }
        .chat-sidebar h3 {
            padding: 16px;
            font-size: 20px;
            color: #050505;
        }
        .chat-user {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 16px;
            cursor: pointer;
            transition: background .15s;
        }
        .chat-user:hover {
            background: #f2f2f2;
        }
        .chat-user.active {
            background: #e7f0fd;
        }
        .chat-user-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #e4e6eb;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #65676b;
            flex-shrink: 0;
        }
        .chat-user-name {
            font-size: 15px;
            font-weight: 600;
            color: #050505;
        }
        .chat-user-msg {
            font-size: 13px;
            color: #65676b;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #fff;
        }
        .chat-header {
            padding: 14px 20px;
            border-bottom: 1px solid #e4e6eb;
            font-size: 17px;
            font-weight: 600;
            color: #050505;
        }
        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .chat-message {
            max-width: 60%;
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.4;
        }
        .chat-message.sent {
            align-self: flex-end;
            background: #1877f2;
            color: #fff;
            border-bottom-right-radius: 4px;
        }
        .chat-message.received {
            align-self: flex-start;
            background: #f0f2f5;
            color: #050505;
            border-bottom-left-radius: 4px;
        }
        .chat-message .time {
            font-size: 11px;
            opacity: .7;
            margin-top: 4px;
        }
        .chat-input-area {
            display: flex;
            gap: 10px;
            padding: 12px 16px;
            border-top: 1px solid #e4e6eb;
        }
        .chat-input-area input {
            flex: 1;
            border: none;
            outline: none;
            background: #f0f2f5;
            border-radius: 20px;
            padding: 10px 16px;
            font-size: 15px;
        }
        .chat-input-area button {
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 50%;
            background: #1877f2;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .chat-input-area button:hover {
            background: #166fe5;
        }
        .chat-placeholder {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #65676b;
            font-size: 17px;
        }
    </style>
</head>
<body>
    {% include 'includes/navbar.html' %}
    <div class="chat-page">
        {% block chat_content %}{% endblock %}
    </div>
    <script src="{% static 'base/js/main.js' %}"></script>
</body>
</html>
