{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="{% static 'base/img/favicon.ico' %}">
    <title>{% block title %}Chat{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'base/css/global.css' %}">
    <link rel="stylesheet" href="{% static 'base/css/navbar.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        .chat-page {
            display: flex;
            height: calc(100vh - 60px);
            max-width: 1200px;
            margin: 0 auto;
        }
        .chat-sidebar {
            width: 340px;
            border-right: 1px solid #e4e6eb;
            background: #fff;
            overflow-y: auto;
            flex-shrink: 0;
        }
        .chat-sidebar h3 {
            padding: 16px;
            font-size: 20px;
            color: #050505;
        }
        .chat-user {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 16px;
            cursor: pointer;
            transition: background .15s;
            text-decoration: none;
            color: inherit;
        }
        .chat-user:hover {
            background: #f2f2f2;
        }
        .chat-user.active {
            background: #e7f0fd;
        }
        .chat-user-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #e4e6eb;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #65676b;
            flex-shrink: 0;
            overflow: hidden;
        }
        .chat-user-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .chat-user-name {
            font-size: 15px;
            font-weight: 600;
            color: #050505;
        }
        .chat-user-msg {
            font-size: 13px;
            color: #65676b;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #fff;
            min-width: 0;
        }
        .chat-header {
            padding: 14px 20px;
            border-bottom: 1px solid #e4e6eb;
            font-size: 17px;
            font-weight: 600;
            color: #050505;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .chat-header-info {
            display: flex;
            flex-direction: column;
        }
        .chat-header-status {
            font-size: 12px;
            font-weight: 400;
            color: #65676b;
        }
        .chat-header-status.online {
            color: #31a24c;
        }
        .chat-back-btn {
            display: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: #e4e6eb;
            cursor: pointer;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: #050505;
            flex-shrink: 0;
            text-decoration: none;
        }
        .chat-back-btn:hover {
            background: #d8dadf;
        }
        .chat-user-unread {
            background: #e7f0fd !important;
            font-weight: 600;
        }
        .chat-user-unread .chat-user-name {
            font-weight: 700;
        }
        .chat-user-unread .chat-user-msg {
            color: #1877f2;
            font-weight: 600;
        }
        .chat-user-status {
            font-size: 12px;
            color: #65676b;
        }
        .chat-user-status.online {
            color: #31a24c;
            font-weight: 600;
        }
        .chat-user-status i {
            font-size: 10px;
            margin-right: 4px;
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .chat-message {
            max-width: 60%;
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.4;
        }
        .chat-message.sent {
            align-self: flex-end;
            background: #1877f2;
            color: #fff;
            border-bottom-right-radius: 4px;
        }
        .chat-message.received {
            align-self: flex-start;
            background: #f0f2f5;
            color: #050505;
            border-bottom-left-radius: 4px;
        }
        .chat-message .time {
            font-size: 11px;
            opacity: .7;
            margin-top: 4px;
        }
        .chat-input-area {
            display: flex;
            gap: 10px;
            padding: 12px 16px;
            border-top: 1px solid #e4e6eb;
        }
        .chat-input-area input {
            flex: 1;
            border: none;
            outline: none;
            background: #f0f2f5;
            border-radius: 20px;
            padding: 10px 16px;
            font-size: 15px;
        }
        .chat-input-area button {
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 50%;
            background: #1877f2;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .chat-input-area button:hover {
            background: #166fe5;
        }
        .chat-emoji-btn {
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 50%;
            background: transparent;
            color: #65676b;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
            transition: background .15s;
        }
        .chat-emoji-btn:hover {
            background: #f0f2f5;
        }
        .chat-emoji-picker {
            display: none;
            position: absolute;
            bottom: 60px;
            left: 16px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.2);
            border: 1px solid #e4e6eb;
            z-index: 100;
            width: 280px;
            padding: 8px;
        }
        .chat-emoji-picker.open {
            display: block;
        }
        .emoji-picker-header {
            font-size: 14px;
            font-weight: 600;
            color: #65676b;
            padding: 4px 8px 8px;
            border-bottom: 1px solid #e4e6eb;
            margin-bottom: 8px;
        }
        .emoji-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 4px;
        }
        .emoji-grid span {
            font-size: 24px;
            cursor: pointer;
            padding: 4px;
            border-radius: 6px;
            text-align: center;
            transition: background .15s;
        }
        .emoji-grid span:hover {
            background: #f0f2f5;
        }
        .chat-placeholder {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #65676b;
            font-size: 17px;
        }

        @media (max-width: 768px) {
            .chat-page { max-width: 100%; }
            .chat-sidebar {
                width: 100%;
                border-right: none;
            }
            .chat-main {
                display: none;
            }
            .chat-main.active {
                display: flex;
            }
            .chat-sidebar.hidden {
                display: none;
            }
            .chat-back-btn {
                display: flex;
            }
            .chat-message {
                max-width: 85%;
            }
        }
    </style>
</head>
<body>
    {% include 'includes/navbar.html' %}
    <div class="chat-page">
        {% block chat_content %}{% endblock %}
    </div>
    <script src="{% static 'base/js/main.js' %}"></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
