{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login</title>
  <link rel="stylesheet" href="{% static 'base/css/global.css' %}">
  <style>
    .auth-page {
      gap: 32px;
      padding-top: 64px;
    }

    .brand {
      max-width: 480px;
      flex: 1;
    }

    .brand-logo {
      color: #1877f2;
      font-size: 60px;
      font-weight: 800;
      letter-spacing: -2px;
      line-height: 1;
      margin-bottom: 16px;
    }

    .brand-tagline {
      font-size: 26px;
      line-height: 1.35;
    }

    .auth-card .input {
      margin-bottom: 12px;
    }

    .btn-login {
      width: 100%;
      font-size: 20px;
      padding: 14px;
      margin-bottom: 16px;
    }

    .forgot-link {
      display: block;
      text-align: center;
      color: #1877f2;
      font-size: 14px;
      margin-bottom: 20px;
    }

    .forgot-link:hover {
      text-decoration: underline;
    }

    .auth-card .divider {
      margin-bottom: 20px;
    }

    .btn-create {
      display: block;
      width: fit-content;
      margin: 0 auto;
      font-size: 17px;
      padding: 14px 24px;
    }

    @media (max-width: 820px) {
      .auth-page {
        flex-direction: column;
        align-items: center;
        padding-top: 32px;
        gap: 16px;
      }

      .brand {
        text-align: center;
        max-width: 396px;
      }

      .brand-logo { font-size: 48px; }
      .brand-tagline { font-size: 20px; }
    }
  </style>
</head>
<body>

  <div class="auth-page">
    <div class="brand">
      <div class="brand-logo">facebook</div>
      <p class="brand-tagline">Connect with friends and the world around you on Facebook.</p>
    </div>

    <div class="card auth-card">
      <form action="{% url 'login' %}" method="POST">
        {% csrf_token %}
        <input class="input" type="text" name="username" placeholder="Email address or phone number" />
        <input class="input" type="password" name="password" placeholder="Password" />
        <button class="btn btn-primary btn-login" type="submit">Log in</button>
      </form>
      <a class="forgot-link" href="#">Forgotten password?</a>
      <hr class="divider" />
      <a href="{% url 'register' %}" class="btn btn-success btn-create">Create new account</a>
    </div>
  </div>

</body>
</html>
