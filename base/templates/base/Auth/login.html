{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login</title>
  <link rel="stylesheet" href="{% static 'base/css/global.css' %}">
  <style>
    .auth-page {
      gap: 32px;
      padding-top: 64px;
    }

    .brand {
      max-width: 480px;
      flex: 1;
    }

    .brand-logo {
      color: #1877f2;
      font-size: 60px;
      font-weight: 800;
      letter-spacing: -2px;
      line-height: 1;
      margin-bottom: 16px;
    }

    .brand-tagline {
      font-size: 26px;
      line-height: 1.35;
    }

    .auth-card .input {
      margin-bottom: 12px;
    }

    .auth-card .password-wrap {
      margin-bottom: 12px;
    }

    .auth-card .password-wrap .input {
      margin-bottom: 0;
    }

    .btn-login {
      width: 100%;
      font-size: 20px;
      padding: 14px;
      margin-bottom: 16px;
    }

    .forgot-link {
      display: block;
      text-align: center;
      color: #1877f2;
      font-size: 14px;
      margin-bottom: 20px;
    }

    .forgot-link:hover {
      text-decoration: underline;
    }

    .auth-card .divider {
      margin-bottom: 20px;
    }

    .btn-create {
      display: block;
      width: fit-content;
      margin: 0 auto;
      font-size: 17px;
      padding: 14px 24px;
    }

    .auth-errors {
      margin-bottom: 16px;
    }

    .auth-error {
      background: #ffebee;
      color: #c62828;
      border: 1px solid #ef9a9a;
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 14px;
      margin-bottom: 8px;
    }

    @media (max-width: 820px) {
      .auth-page {
        flex-direction: column;
        align-items: center;
        padding-top: 32px;
        gap: 16px;
      }

      .brand {
        text-align: center;
        max-width: 396px;
      }

      .brand-logo { font-size: 48px; }
      .brand-tagline { font-size: 20px; }
    }

    @media (max-width: 480px) {
      .brand-logo { font-size: 36px; }
      .brand-tagline { font-size: 17px; }
      .auth-card { padding: 16px 12px 24px; }
      .btn-login { font-size: 17px; padding: 12px; }
    }
  </style>
</head>
<body class="auth-body">

  <div class="auth-page">
    <div class="brand">
      <div class="brand-logo">facebook</div>
      <p class="brand-tagline">Connect with friends and the world around you on Facebook.</p>
    </div>

    <div class="card auth-card">
      {% if messages %}
      <div class="auth-errors">
        {% for msg in messages %}
        <div class="auth-error">{{ msg }}</div>
        {% endfor %}
      </div>
      {% endif %}
      <form action="{% url 'login' %}" method="POST">
        {% csrf_token %}
        <input class="input" type="text" name="username" placeholder="Email, phone, or username" value="{{ request.POST.username }}" />
        <div class="password-wrap">
          <input class="input" type="password" name="password" placeholder="Password" id="loginPassword" />
          <button type="button" class="password-toggle" onclick="togglePass('loginPassword', this)"><i class="fa-regular fa-eye"></i></button>
        </div>
        <button class="btn btn-primary btn-login" type="submit">Log in</button>
      </form>
      <a class="forgot-link" href="#">Forgotten password?</a>
      <hr class="divider" />
      <a href="{% url 'register' %}" class="btn btn-success btn-create">Create new account</a>
    </div>
  </div>

{% include 'includes/footer.html' %}
<script>
function togglePass(id, btn) {
  var inp = document.getElementById(id);
  if (inp.type === 'password') {
    inp.type = 'text';
    btn.innerHTML = '<i class="fa-regular fa-eye-slash"></i>';
  } else {
    inp.type = 'password';
    btn.innerHTML = '<i class="fa-regular fa-eye"></i>';
  }
}
</script>
</body>
</html>
